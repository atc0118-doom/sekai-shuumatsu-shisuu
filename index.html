<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>終末観測盤 / 世界終末指数</title>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://a.basemaps.cartocdn.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQJBkDMYe5xSqEnfPIbCk3mJQnQL5X0=" crossorigin=""/>
<style>
:root{--bg:#070000;--paper:#120303;--red:#e30012;--red2:#7b0008;--white:#f2e8e8;--muted:#9b7777;--line:#5c0b0b;--dark:#000;--amber:#ffb000;}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% 0,#2b0204 0,#060000 42%,#000 100%);color:var(--white);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans JP','Yu Gothic',sans-serif;letter-spacing:.04em;}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 4px),repeating-linear-gradient(90deg,rgba(227,0,18,.035) 0 1px,transparent 1px 9px);mix-blend-mode:screen;pointer-events:none;opacity:.55;z-index:9999}.wrap{max-width:1240px;margin:auto;padding:18px}.top{border:2px solid var(--red);padding:22px;background:linear-gradient(135deg,rgba(227,0,18,.16),rgba(0,0,0,.88));box-shadow:0 0 28px rgba(227,0,18,.35),inset 0 0 45px rgba(227,0,18,.12);position:relative;overflow:hidden}.logo{font-weight:900;font-size:clamp(44px,10vw,116px);line-height:.86;letter-spacing:-.08em;position:relative;text-shadow:6px 5px 0 #000, -5px -3px 0 var(--red), 0 0 16px rgba(227,0,18,.65)}.logo:after{content:"終末観測盤";position:absolute;left:12px;top:7px;color:transparent;-webkit-text-stroke:1px var(--red);opacity:.7;z-index:-1}.sub{margin-top:12px;color:#ffb5b5;font-weight:700}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tag{border:1px solid var(--red);padding:6px 10px;background:#160102;color:#ffd0d0;font-size:12px}.grid{display:grid;grid-template-columns:1.08fr .92fr;gap:14px;margin-top:14px}.grid.mapgrid{grid-template-columns:1.35fr .65fr}.card{background:linear-gradient(180deg,rgba(24,2,3,.95),rgba(3,0,0,.96));border:1px solid var(--line);padding:16px;box-shadow:0 0 18px rgba(227,0,18,.16)}.card h2{margin:0 0 12px;color:#fff;font-size:18px;border-bottom:1px solid var(--red);padding-bottom:8px;text-shadow:2px 1px 0 var(--red)}.doom{font-size:clamp(72px,18vw,170px);font-weight:900;line-height:.9;color:#fff;text-shadow:7px 5px 0 var(--red),0 0 22px rgba(227,0,18,.6)}.level{font-size:32px;font-weight:900;color:#ff2c39;animation:pulse 1.8s infinite}.delta{display:inline-block;margin-left:10px;padding:4px 8px;border:1px solid var(--red);font-size:15px;color:#fff;background:#270003;vertical-align:middle}.delta.up{color:#fff;background:#850008}.delta.down{color:#d7d7d7;background:#151515;border-color:#555}.meter{height:16px;border:1px solid var(--red);background:#140000;margin:12px 0;position:relative;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#5a0000,#e30012,#fff);width:55%;box-shadow:0 0 18px var(--red)}@keyframes pulse{50%{opacity:.55;text-shadow:0 0 22px #f00}}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #4d0909;padding:12px;background:#080000}.metric b{display:block;font-size:13px;color:#ff9b9b}.metric span.num{font-size:32px;font-weight:900;color:#fff;text-shadow:3px 2px 0 var(--red)}.metric small{display:block;color:#ff8f8f;margin-top:2px}.map{height:480px;border:1px solid var(--red);position:relative;background:#050000;overflow:hidden;box-shadow:inset 0 0 60px rgba(227,0,18,.25),0 0 26px rgba(227,0,18,.2)}#realMap{position:absolute;inset:0;background:#050000;filter:contrast(1.15) saturate(.8)}.leaflet-container{background:#050000;color:#fff}.leaflet-control-attribution{background:rgba(0,0,0,.55)!important;color:#8c7070!important}.leaflet-control-attribution a{color:#c55252!important}.leaflet-tile{filter:grayscale(1) invert(.92) contrast(1.15) brightness(.62) sepia(.15) hue-rotate(305deg) saturate(1.3)}.map:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,transparent 0 55%,rgba(0,0,0,.75) 100%),repeating-linear-gradient(0deg,rgba(227,0,18,.08) 0 1px,transparent 1px 6px);pointer-events:none}.fallbackMap{position:absolute;inset:0;display:none;place-items:center;color:#ffb4b4;font-weight:900;background:radial-gradient(circle,#220004,#030000)}.hot-label{color:#ffd7d7;font-weight:900;text-shadow:0 0 4px #000,0 0 8px #e30012;white-space:nowrap}.hot-dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid #e30012;box-shadow:0 0 14px 7px rgba(227,0,18,.78);animation:blink 1.15s infinite}.leaflet-marker-icon.hot-dot{margin-left:-8px!important;margin-top:-8px!important}.leaflet-tooltip.hot-label{background:rgba(0,0,0,.45);border:1px solid rgba(227,0,18,.55);box-shadow:0 0 12px rgba(227,0,18,.35);padding:3px 7px}.heat-ring{border-radius:50%;background:radial-gradient(circle,rgba(227,0,18,.48) 0,rgba(227,0,18,.23) 35%,rgba(227,0,18,.08) 62%,transparent 72%);animation:heatPulse 2s infinite;mix-blend-mode:screen}@keyframes blink{50%{transform:scale(1.65);opacity:.45}}@keyframes heatPulse{50%{opacity:.48;transform:scale(1.08)}}.regions{display:grid;gap:8px}.region{display:grid;grid-template-columns:92px 1fr 48px;align-items:center;gap:8px;cursor:pointer;padding:6px;border:1px solid transparent}.region:hover,.region.active{border-color:var(--red);background:#180002}.bar{height:12px;border:1px solid #8a1717;background:#100}.bar i{display:block;height:100%;background:linear-gradient(90deg,#4b0000,#e30012,#fff)}.high{color:#ff2634;font-weight:900}.mid{color:#ff9b9b}.low{color:#bbb}.detail{margin-top:12px;border:1px solid var(--red);background:#090000;padding:12px}.detailTitle{font-size:20px;font-weight:900;color:#fff;text-shadow:2px 1px 0 var(--red)}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.detailBox{border:1px solid #4d0909;background:#100;padding:9px}.detailBox b{display:block;color:#ff9b9b;font-size:12px}.detailBox span{font-size:24px;font-weight:900}.omens li,.logs li{margin:8px 0;color:#ffe4e4}.omens li:first-child{color:#fff;font-weight:900;text-shadow:0 0 8px var(--red)}.archive{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.event{border:1px solid #5c0b0b;background:#090000;padding:12px;position:relative}.event:before{content:"ARCHIVE";position:absolute;right:8px;top:6px;color:#6b1b1b;font-size:10px;font-weight:900}.event .year{color:#ff7676;font-size:12px}.event .name{font-weight:900;margin:5px 0}.event .score{font-size:38px;font-weight:900;text-shadow:3px 2px 0 var(--red)}.event .near{color:#fff;background:#8b0008;padding:3px 6px;font-size:11px;display:inline-block}.compare{font-size:15px;color:#ffd0d0;line-height:1.8}.footer{margin-top:16px;color:#9b7777;border-top:1px solid #3b0606;padding-top:12px;font-size:12px}@media(max-width:880px){.grid,.grid.mapgrid{grid-template-columns:1fr}.archive{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.logo{letter-spacing:-.1em}.map{height:430px}.level{font-size:25px}.region{grid-template-columns:92px 1fr 44px}}
</style>
</head>
<body>
<div class="wrap">
<header class="top">
  <div class="logo">終末観測盤</div>
  <div class="sub">世界終末指数 / SAT-SYS-01</div>
  <div class="nav"><span class="tag">世界終末指数</span><span class="tag">方面別災厄指数</span><span class="tag">終末観測アーカイブ</span><span class="tag">非公開</span></div>
</header>

<section class="grid">
  <div class="card">
    <h2>災厄合成指数</h2>
    <div><span class="doom" id="doom">--</span><span id="doomDelta" class="delta">--</span></div>
    <div class="level">警戒水準 <span id="roman">--</span> / <span id="level">取得中</span></div>
    <div class="meter"><div class="fill" id="doomFill"></div></div>
    <div class="compare" id="nearest">過去記録照合中...</div>
  </div>
  <div class="card">
    <h2>観測値</h2>
    <div class="metrics">
      <div class="metric"><b>空のざわめき</b><span class="num" id="air">--</span><small id="airDelta">--</small></div>
      <div class="metric"><b>市場の怯え</b><span class="num" id="market">--</span><small id="marketDelta">--</small></div>
      <div class="metric"><b>海運の乱れ</b><span class="num" id="shipping">--</span><small id="shippingDelta">--</small></div>
      <div class="metric"><b>太陽の異変</b><span class="num" id="solar">--</span><small id="solarDelta">--</small></div>
    </div>
  </div>
</section>

<section class="grid mapgrid">
 <div class="card">
  <h2>災厄ヒートマップ</h2>
  <div class="map">
    <div id="realMap"></div>
    <div class="fallbackMap" id="fallbackMap">地図読込待機中</div>
  </div>
 </div>
 <div class="card">
  <h2>方角別観測記録</h2>
  <div class="regions" id="regions"></div>
  <div class="detail" id="regionDetail">
    <div class="detailTitle">方面選択待機</div>
    <div class="compare">地図または方面名を押すと詳細を表示。</div>
  </div>
 </div>
</section>

<section class="grid">
 <div class="card">
  <h2>本日の凶兆</h2>
  <ul class="omens" id="omens"><li>観測値を照合中</li></ul>
 </div>
 <div class="card">
  <h2>最新の観測ログ</h2>
  <ul class="logs" id="logs"><li>記録生成中</li></ul>
 </div>
</section>

<section class="card">
 <h2>終末観測アーカイブ</h2>
 <div class="archive" id="archive"></div>
</section>

<div class="footer">この観測盤は公開情報と簡易推定をもとに災厄指数を生成する。未来を予言するものではない。</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const archives=[
 {year:'2001',name:'9.11同時多発攻撃',score:91,note:'航空・市場・軍事反応が急変'},
 {year:'2008',name:'金融危機',score:84,note:'市場の怯えが極端に増幅'},
 {year:'2011',name:'東日本大震災',score:88,note:'日本周辺・物流・電力不安が急上昇'},
 {year:'2020',name:'世界的感染拡大',score:86,note:'航空停止と市場急変'},
 {year:'2022',name:'ウクライナ侵攻',score:89,note:'黒海方面と市場が急上昇'},
 {year:'2023',name:'中東衝突拡大',score:82,note:'中東方面の緊張上昇'}
];
const regionMeta={
 '中東方面':{lat:29,lng:45,zoom:4,desc:'航空活動・海運・市場反応を重点観測'},
 '台湾海峡方面':{lat:24,lng:121,zoom:5,desc:'航空活動・海峡周辺の緊張を重点観測'},
 '黒海方面':{lat:45,lng:35,zoom:5,desc:'航空活動・市場反応・海運を重点観測'},
 '日本周辺':{lat:36,lng:138,zoom:5,desc:'航空活動・太陽活動・物流影響を重点観測'},
 '北極圏方面':{lat:72,lng:30,zoom:3,desc:'太陽活動・高緯度通信影響を重点観測'},
 '米国本土方面':{lat:39,lng:-98,zoom:4,desc:'市場反応・航空活動を重点観測'}
};
let map, layerGroup, lastRegions=[], currentData=null;
function val(x){ if(typeof x==='number') return x; if(x&&typeof x.value==='number') return x.value; return 0; }
function roman(score){if(score>=85)return 'Ⅴ'; if(score>=70)return 'Ⅳ'; if(score>=50)return 'Ⅲ'; if(score>=30)return 'Ⅱ'; return 'Ⅰ'}
function label(score){if(score>=85)return '異常'; if(score>=70)return '危険'; if(score>=50)return '警戒'; if(score>=30)return '注意'; return '平常'}
function clamp(n){return Math.max(0,Math.min(100,Math.round(n)))}
function fallback(){const t=Date.now()/100000;return {ok:true,doom:clamp(54+Math.sin(t)*14),level:'警戒',metrics:{air:clamp(60+Math.sin(t*1.2)*18),market:clamp(49+Math.cos(t*.8)*15),shipping:clamp(55+Math.sin(t*.7)*13),solar:clamp(38+Math.cos(t*1.5)*20)},source:'local'}}
async function getData(){try{const r=await fetch('/api/doom?ts='+Date.now(),{cache:'no-store'});const d=await r.json();if(!d||typeof d.doom!=='number')throw new Error('bad');return d}catch(e){return fallback()}}
function regionScores(d){const m=d.metrics||{};const air=val(m.air),market=val(m.market),shipping=val(m.shipping),solar=val(m.solar);return [
 ['中東方面',clamp(air*.45+shipping*.35+market*.2+12),{air:clamp(air+8),shipping:clamp(shipping+16),market:clamp(market+5),solar:clamp(solar-5)}],
 ['台湾海峡方面',clamp(air*.5+shipping*.25+solar*.1+8),{air:clamp(air+12),shipping:clamp(shipping+6),market:clamp(market),solar:clamp(solar)}],
 ['黒海方面',clamp(air*.38+market*.28+shipping*.22+6),{air:clamp(air+4),shipping:clamp(shipping+8),market:clamp(market+10),solar:clamp(solar-4)}],
 ['日本周辺',clamp(air*.3+solar*.35+shipping*.2),{air:clamp(air-4),shipping:clamp(shipping),market:clamp(market-3),solar:clamp(solar+8)}],
 ['北極圏方面',clamp(solar*.45+air*.2+10),{air:clamp(air-8),shipping:clamp(shipping-5),market:clamp(market-8),solar:clamp(solar+18)}],
 ['米国本土方面',clamp(market*.45+air*.25+solar*.15),{air:clamp(air),shipping:clamp(shipping-6),market:clamp(market+13),solar:clamp(solar)}]
].sort((a,b)=>b[1]-a[1])}
function readPrev(){try{return JSON.parse(localStorage.getItem('wdiPrev')||'{}')}catch(e){return {}}}
function savePrev(d){try{localStorage.setItem('wdiPrev',JSON.stringify({doom:d.doom,metrics:d.metrics,t:Date.now()}))}catch(e){}}
function deltaText(now,prev){if(typeof prev!=='number')return '前回比 --';const diff=clamp(now)-clamp(prev);if(diff>0)return '▲'+diff; if(diff<0)return '▼'+Math.abs(diff); return '±0'}
function deltaClass(now,prev){if(typeof prev!=='number')return '';return now>prev?'up':now<prev?'down':''}
function setDelta(id,now,prev){const el=document.getElementById(id);el.textContent=deltaText(now,prev);el.className='delta '+deltaClass(now,prev)}
function setSmallDelta(id,now,prev){const el=document.getElementById(id);el.textContent=deltaText(now,prev);el.style.color=now>prev?'#ff6b6b':now<prev?'#bbb':'#ff8f8f'}
function renderRegions(rs){document.getElementById('regions').innerHTML=rs.map(([n,s])=>`<div class="region" onclick="selectRegion('${n.replace(/'/g,'')}')" data-region="${n}"><b>${n}</b><div class="bar"><i style="width:${s}%"></i></div><span class="${s>=70?'high':s>=50?'mid':'low'}">${s}</span></div>`).join('')}
function renderArchive(current){let nearest=archives.reduce((a,b)=>Math.abs(b.score-current)<Math.abs(a.score-current)?b:a,archives[0]);document.getElementById('nearest').innerHTML=`過去記録照合：現在値は <b>${nearest.name}</b> の観測圏に接近。差分 ${Math.abs(nearest.score-current)}。`;
 document.getElementById('archive').innerHTML=archives.map(e=>`<div class="event"><div class="year">${e.year}</div><div class="name">${e.name}</div><div class="score">${e.score}</div><div>${e.note}</div>${Math.abs(e.score-current)<=8?'<span class="near">現在値接近</span>':''}</div>`).join('')}
function omens(rs,d){const top=rs.slice(0,3);const m=d.metrics||{};const air=val(m.air),market=val(m.market),shipping=val(m.shipping),solar=val(m.solar);let arr=[`${top[0][0]}の赤色反応が拡大`,`${top[1][0]}を重点観測区域に指定`, air>60?'特殊機活動の増加を観測':'航空活動に微細な乱れ', market>60?'市場心理の悪化傾向':'市場反応は限定的', shipping>60?'海運の乱れが継続':'海運監視に変化なし', solar>65?'太陽活動の乱れを検出':'太陽活動は監視範囲内'].slice(0,5);document.getElementById('omens').innerHTML=arr.map(x=>`<li>${x}</li>`).join('')}
function logs(rs,d){const now=new Date();const times=[0,7,13,22].map(min=>new Date(now-min*60000).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));let l=[`${times[0]}　${rs[0][0]}　危険方面として記録`,`${times[1]}　空のざわめき　${val(d.metrics.air)}`,`${times[2]}　市場の怯え　${val(d.metrics.market)}`,`${times[3]}　海運の乱れ　${val(d.metrics.shipping)}`];document.getElementById('logs').innerHTML=l.map(x=>`<li>${x}</li>`).join('')}
function initMap(){try{ if(!window.L) throw new Error('leaflet missing'); map=L.map('realMap',{zoomControl:false,worldCopyJump:true,attributionControl:true}).setView([28,55],2); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:7,minZoom:2,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map); layerGroup=L.layerGroup().addTo(map); setTimeout(()=>map.invalidateSize(),300); }catch(e){document.getElementById('fallbackMap').style.display='grid';}}
function drawMap(rs){ if(!map||!layerGroup)return; layerGroup.clearLayers(); rs.forEach(([name,score])=>{const meta=regionMeta[name]; if(!meta)return; const radius=score>=75?820:score>=60?650:score>=45?470:300; const opacity=score>=70?.42:score>=50?.25:.14; L.circle([meta.lat,meta.lng],{radius:radius*1000,color:'#e30012',weight:1,fillColor:'#e30012',fillOpacity:opacity,opacity:.65}).addTo(layerGroup).on('click',()=>selectRegion(name)); const icon=L.divIcon({className:'hot-dot',iconSize:[16,16],html:''}); L.marker([meta.lat,meta.lng],{icon}).addTo(layerGroup).on('click',()=>selectRegion(name)).bindTooltip(`${name} ${score}`,{permanent:true,direction:'right',offset:[10,0],className:'hot-label'}); }); }
function selectRegion(name){const row=lastRegions.find(r=>r[0]===name); if(!row||!currentData)return; document.querySelectorAll('.region').forEach(x=>x.classList.toggle('active',x.dataset.region===name)); const [n,s,parts]=row; const meta=regionMeta[name]||{}; if(map&&meta.lat){map.setView([meta.lat,meta.lng],meta.zoom||4,{animate:true});}
 document.getElementById('regionDetail').innerHTML=`<div class="detailTitle">${n}　<span class="${s>=70?'high':s>=50?'mid':'low'}">${s}</span></div><div class="compare">${meta.desc||'観測中'}</div><div class="detailGrid"><div class="detailBox"><b>航空活動</b><span>${parts.air}</span></div><div class="detailBox"><b>海運異常</b><span>${parts.shipping}</span></div><div class="detailBox"><b>市場反応</b><span>${parts.market}</span></div><div class="detailBox"><b>太陽影響</b><span>${parts.solar}</span></div></div>`;}
async function update(){const prev=readPrev();const d=await getData();currentData=d;const m=d.metrics||{};const air=val(m.air),market=val(m.market),shipping=val(m.shipping),solar=val(m.solar);document.getElementById('doom').textContent=d.doom;document.getElementById('level').textContent=d.level||label(d.doom);document.getElementById('roman').textContent=roman(d.doom);document.getElementById('doomFill').style.width=d.doom+'%';setDelta('doomDelta',d.doom,prev.doom);document.getElementById('air').textContent=air;document.getElementById('market').textContent=market;document.getElementById('shipping').textContent=shipping;document.getElementById('solar').textContent=solar;setSmallDelta('airDelta',air,val(prev.metrics&&prev.metrics.air));setSmallDelta('marketDelta',market,val(prev.metrics&&prev.metrics.market));setSmallDelta('shippingDelta',shipping,val(prev.metrics&&prev.metrics.shipping));setSmallDelta('solarDelta',solar,val(prev.metrics&&prev.metrics.solar));const rs=regionScores(d);lastRegions=rs;renderRegions(rs);drawMap(rs);renderArchive(d.doom);omens(rs,d);logs(rs,d);selectRegion(rs[0][0]);savePrev({doom:d.doom,metrics:{air,market,shipping,solar}})}
initMap();update();setInterval(update,300000);
</script>
</body>
</html>
