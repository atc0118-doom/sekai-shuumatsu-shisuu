<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>終末観測盤｜リアルタイム半自動投稿版 v3</title>
  <style>
    :root{--bg:#050506;--panel:#0d0d10;--line:#2a0c0c;--red:#e21b23;--red2:#7f1117;--text:#eee;--muted:#999;--good:#c7c7c7;--warn:#ffcc66}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0%,#1b0809 0,#050506 35%,#000 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.02em}.scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.035),rgba(255,255,255,.035) 1px,transparent 1px,transparent 4px);mix-blend-mode:overlay;opacity:.3}.wrap{max-width:1180px;margin:0 auto;padding:20px}.header{border:1px solid var(--line);background:linear-gradient(135deg,rgba(226,27,35,.18),rgba(0,0,0,.8));padding:20px;position:relative;overflow:hidden}.header:before{content:"WORLD DOOMSDAY INDEX";position:absolute;right:12px;top:8px;color:rgba(255,255,255,.05);font-weight:900;font-size:44px}.title{font-size:clamp(28px,5vw,58px);font-weight:950;line-height:1;color:#fff;text-shadow:2px 2px 0 #8b0000}.sub{color:var(--muted);margin-top:8px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:16px}@media(max-width:900px){.grid{grid-template-columns:1fr}}.card{border:1px solid var(--line);background:rgba(10,10,12,.88);padding:16px;box-shadow:0 0 18px rgba(226,27,35,.08)}.card h2{margin:0 0 12px;font-size:16px;color:#fff;border-left:4px solid var(--red);padding-left:8px}.scorebox{display:flex;align-items:end;gap:12px}.score{font-size:78px;font-weight:950;color:#fff;line-height:.9}.level{font-size:18px;color:var(--warn);font-weight:800}.meter{height:16px;background:#151515;border:1px solid #333;margin-top:14px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#5d0b0f,#e21b23,#ffcc66);transition:width .6s}.row{display:grid;grid-template-columns:50px 1fr 52px 52px;gap:8px;align-items:center;border-bottom:1px solid #1d1d22;padding:9px 0}.row .rank{color:var(--red);font-weight:900}.row .name{font-weight:800}.row .value{text-align:right;font-weight:900}.row .delta{text-align:right;color:#ddd}.delta.up{color:#ff7979}.delta.down{color:#8fd3ff}.delta.same{color:#aaa}.news{border-bottom:1px solid #1d1d22;padding:10px 0}.news a{color:#fff;text-decoration:none}.news a:hover{text-decoration:underline}.news .meta{font-size:12px;color:var(--muted);margin-top:4px}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}@media(max-width:600px){.controls{grid-template-columns:1fr 1fr}}button,select,input{background:#111;border:1px solid #3b1717;color:#fff;padding:10px;border-radius:4px}button{cursor:pointer;font-weight:800}button.primary{background:#7f1117;border-color:#e21b23}.post{width:100%;min-height:310px;background:#070707;color:#eee;border:1px solid #3b1717;padding:12px;line-height:1.55;font-size:14px}.small{color:var(--muted);font-size:12px;line-height:1.5}.log{font-family:ui-monospace,monospace;color:#bbb;font-size:12px;white-space:pre-wrap;max-height:180px;overflow:auto}.pill{display:inline-block;border:1px solid #3b1717;padding:3px 8px;margin:2px;color:#ddd;background:#090909}.footer{color:#777;font-size:12px;margin-top:18px;line-height:1.6}</style>
</head>
<body><div class="scan"></div><div class="wrap">
  <header class="header"><div class="title">終末観測盤</div><div class="sub">GDELTニュース混合・リアルタイム半自動投稿版 v3 / 関連ニュース日本語要約対応</div></header>
  <div class="grid">
    <section class="card"><h2>総合世界終末指数</h2><div class="scorebox"><div class="score" id="globalScore">--</div><div><div class="level" id="levelText">観測準備中</div><div class="small" id="updatedAt">--</div></div></div><div class="meter"><div class="bar" id="bar"></div></div><div id="signals" style="margin-top:12px"></div></section>
    <section class="card"><h2>操作</h2><div class="controls"><button class="primary" id="refreshBtn">最新取得</button><select id="postMode"><option value="morning">朝</option><option value="noon">昼</option><option value="night">夜</option><option value="alert">速報</option></select><button id="makePostBtn">投稿文生成</button><button id="copyBtn">コピー</button></div><div class="small">投稿文はランキング＋関連ニュースの日本語要約を自動で混ぜます。Xには手動で貼り付けてください。</div></section>
  </div>
  <div class="grid">
    <section class="card"><h2>世界異変ランキング TOP20</h2><div id="ranking"></div></section>
    <section class="card"><h2>関連ニュース</h2><div id="news"></div></section>
  </div>
  <section class="card" style="margin-top:16px"><h2>半自動投稿文</h2><textarea id="postText" class="post" placeholder="ここに投稿文が生成されます"></textarea></section>
  <section class="card" style="margin-top:16px"><h2>観測ログ</h2><div id="log" class="log"></div></section>
  <div class="footer">免責：本サイトは公開ニュース情報をもとにした独自指標です。予測・投資判断・安全保障判断を保証するものではありません。航空機個体追跡や個人行動の特定には使用しないでください。</div>
</div>
<script>
const REGIONS=[
 {id:'israel',flag:'🇮🇱',name:'イスラエル周辺',keys:['israel','gaza','hamas','hezbollah','lebanon','jerusalem']},
 {id:'iran',flag:'🇮🇷',name:'イラン',keys:['iran','tehran','hormuz','strait of hormuz']},
 {id:'ukraine',flag:'🇺🇦',name:'ウクライナ',keys:['ukraine','kyiv','zelensky','donetsk','kharkiv']},
 {id:'russia',flag:'🇷🇺',name:'ロシア',keys:['russia','moscow','putin','kremlin']},
 {id:'blacksea',flag:'🌊',name:'黒海周辺',keys:['black sea','crimea','odessa','sevastopol']},
 {id:'redsea',flag:'🌊',name:'紅海周辺',keys:['red sea','houthi','yemen','suez','bab el mandeb']},
 {id:'taiwan',flag:'🇹🇼',name:'台湾海峡',keys:['taiwan','taiwan strait','pla','taipei']},
 {id:'china',flag:'🇨🇳',name:'中国',keys:['china','beijing','south china sea']},
 {id:'northkorea',flag:'🇰🇵',name:'北朝鮮',keys:['north korea','pyongyang','kim jong']},
 {id:'sudan',flag:'🇸🇩',name:'スーダン',keys:['sudan','khartoum','darfur','rsf']},
 {id:'drc',flag:'🇨🇩',name:'コンゴ民主共和国',keys:['congo','drc','kinshasa','goma']},
 {id:'myanmar',flag:'🇲🇲',name:'ミャンマー',keys:['myanmar','burma','yangon','junta']},
 {id:'pakistan',flag:'🇵🇰',name:'パキスタン',keys:['pakistan','islamabad','balochistan']},
 {id:'india',flag:'🇮🇳',name:'インド',keys:['india','new delhi','kashmir']},
 {id:'venezuela',flag:'🇻🇪',name:'ベネズエラ',keys:['venezuela','caracas','maduro']},
 {id:'serbia',flag:'🇷🇸',name:'セルビア',keys:['serbia','belgrade','kosovo']},
 {id:'haiti',flag:'🇭🇹',name:'ハイチ',keys:['haiti','port-au-prince']},
 {id:'usa',flag:'🇺🇸',name:'米国本土',keys:['united states','washington','pentagon']},
 {id:'japan',flag:'🇯🇵',name:'日本周辺',keys:['japan','okinawa','senkaku','east china sea']},
 {id:'bolivia',flag:'🇧🇴',name:'ボリビア',keys:['bolivia','la paz']}
];
const CRISIS=['war','strike','missile','drone','attack','military','sanction','nuclear','ceasefire','protest','riot','coup','conflict','troops','evacuation','explosion','crisis','blockade','naval','airstrike','dead','killed'];
// 2026-07 改修版：ニュース件数だけで100に張り付かないように、平常値・変化量・重要語を分離して採点。
// v3：英語ニュース見出しを簡易的に日本語要約して表示・投稿文へ混合。
const BASELINE={ukraine:26,russia:24,israel:20,iran:18,china:18,taiwan:16,blacksea:18,redsea:16,northkorea:15,sudan:16,drc:14,myanmar:14,pakistan:14,india:13,venezuela:12,serbia:11,haiti:11,usa:12,japan:10,bolivia:10};
const KEYWORD_WEIGHTS={
  'nuclear':26,'tactical nuclear':32,'missile':14,'ballistic':18,'drone':8,'airstrike':13,'strike':8,'attack':8,'explosion':10,
  'war':10,'invasion':18,'troops':9,'military':7,'naval':10,'blockade':18,'evacuation':10,'dead':7,'killed':7,
  'coup':18,'riot':9,'protest':5,'sanction':6,'crisis':7,
  'ceasefire':-8,'talks':-4,'humanitarian':-5,'aid':-4
};
let state={ranking:[],news:[],global:0};
function log(s){document.getElementById('log').textContent=`[${new Date().toLocaleTimeString('ja-JP')}] ${s}\n`+document.getElementById('log').textContent}
function gdeltUrl(){const q=encodeURIComponent(`(${CRISIS.join(' OR ')}) sourceCountry:US`);return `https://api.gdeltproject.org/api/v2/doc/doc?query=${q}&mode=ArtList&format=json&maxrecords=100&timespan=24h&sort=HybridRel`;}
async function fetchGdelt(){log('GDELT取得開始');const res=await fetch(gdeltUrl());if(!res.ok)throw new Error('GDELT API error');const data=await res.json();return (data.articles||[]).map(a=>({title:a.title||'',url:a.url||'',source:a.sourceCommonName||'',time:a.seendate||'',text:((a.title||'')+' '+(a.domain||'')+' '+(a.socialimage||'')).toLowerCase()}));}
function scoreRegions(articles){
  const prev=JSON.parse(localStorage.getItem('doomsday_scores')||'{}');
  const prevHits=JSON.parse(localStorage.getItem('doomsday_hits')||'{}');
  const results=REGIONS.map(r=>{
    let hits=0;
    let weightScore=0;
    let related=[];
    for(const a of articles){
      const t=(a.title+' '+a.text).toLowerCase();
      const matched=r.keys.some(k=>t.includes(k));
      if(matched){
        hits++;
        related.push(a);
        for(const [kw,w] of Object.entries(KEYWORD_WEIGHTS)){
          if(t.includes(kw)) weightScore+=w;
        }
      }
    }

    const base=BASELINE[r.id]??12;
    const oldHits=prevHits[r.id]??hits;
    const hitDelta=hits-oldHits;

    // 以前の「記事数×係数」方式を廃止。
    // 配分：平常リスク20%、内容30%、変化量40%、継続/件数10%に近い考え方。
    const normalRisk=base;
    const contentRisk=Math.max(-10,Math.min(32,weightScore*0.18));
    const changeRisk=Math.max(-12,Math.min(30,hitDelta*3.2));
    const volumeRisk=Math.min(16,Math.log1p(hits)*5.5);

    let raw=normalRisk+contentRisk+changeRisk+volumeRisk;

    // ソフトキャップ：重大語がない通常報道では70台以上に上がりにくくする。
    const hasSevere=related.some(a=>{
      const t=(a.title+' '+a.text).toLowerCase();
      return ['nuclear','ballistic','blockade','invasion','coup','airstrike'].some(k=>t.includes(k));
    });
    if(!hasSevere && raw>72) raw=72+(raw-72)*0.25;
    if(hasSevere && raw>88) raw=88+(raw-88)*0.45;

    let score=Math.round(Math.max(8,Math.min(100,raw)));
    if(hits===0) score=Math.round(base+Math.random()*5);

    const old=prev[r.id]??score;
    const delta=score-old;
    return {...r,score,delta,hits,news:related.slice(0,3)};
  }).sort((a,b)=>b.score-a.score);

  const save={}, saveHits={};
  results.forEach(r=>{save[r.id]=r.score; saveHits[r.id]=r.hits;});
  localStorage.setItem('doomsday_scores',JSON.stringify(save));
  localStorage.setItem('doomsday_hits',JSON.stringify(saveHits));
  return results;
}

const JP_KEYWORDS=[
  ['nuclear','核関連の言及'],['tactical nuclear','戦術核に関する言及'],['ballistic','弾道ミサイル関連'],['missile','ミサイル関連'],['drone','ドローン関連'],['airstrike','空爆関連'],['strike','攻撃・打撃関連'],['attack','攻撃関連'],['explosion','爆発関連'],['blockade','封鎖・通航制限関連'],['naval','海軍・海上活動関連'],['troops','部隊展開関連'],['military','軍事活動関連'],['invasion','侵攻関連'],['war','戦争関連'],['coup','クーデター関連'],['riot','暴動関連'],['protest','抗議活動関連'],['sanction','制裁関連'],['ceasefire','停戦協議関連'],['talks','協議・交渉関連'],['humanitarian','人道支援関連'],['aid','支援関連']
];
function detectRegionName(text){
  const t=text.toLowerCase();
  const r=REGIONS.find(reg=>reg.keys.some(k=>t.includes(k)));
  return r?`${r.flag} ${r.name}`:'関連地域';
}
function detectEventText(text){
  const t=text.toLowerCase();
  const found=JP_KEYWORDS.filter(([kw])=>t.includes(kw)).map(([,jp])=>jp);
  if(found.length===0) return '政治・安全保障上の動き';
  return [...new Set(found)].slice(0,2).join('、');
}
function jpNewsSummary(n){
  const title=(n.title||'').trim();
  const target=detectRegionName(title+' '+(n.text||''));
  const event=detectEventText(title+' '+(n.text||''));
  const source=n.source?`（${n.source}）`:'';
  return `${target}で${event}が報じられています。情勢変化として観測値に反映中です${source}。`;
}

function render(){const top=state.ranking.slice(0,20); const avg=top.slice(0,10).reduce((s,r)=>s+r.score,0)/10; state.global=Math.round(avg); document.getElementById('globalScore').textContent=state.global; document.getElementById('bar').style.width=state.global+'%'; document.getElementById('levelText').textContent=state.global>=70?'警戒水準Ⅳ':state.global>=50?'警戒水準Ⅲ':state.global>=30?'警戒水準Ⅱ 注意':'警戒水準Ⅰ'; document.getElementById('updatedAt').textContent=new Date().toLocaleString('ja-JP'); document.getElementById('signals').innerHTML=top.slice(0,5).map(r=>`<span class="pill">${r.flag} ${r.name} ${r.score}</span>`).join(''); document.getElementById('ranking').innerHTML=top.map((r,i)=>{let cls=r.delta>0?'up':r.delta<0?'down':'same';let d=r.delta>0?'↑'+r.delta:r.delta<0?'↓'+Math.abs(r.delta):'→';return `<div class="row"><div class="rank">${String(i+1).padStart(2,'0')}</div><div class="name">${r.flag} ${r.name}</div><div class="value">${r.score}</div><div class="delta ${cls}">${d}</div></div>`}).join(''); const related=[]; top.slice(0,8).forEach(r=>r.news.forEach(n=>{if(!related.find(x=>x.url===n.url)) related.push(n)})); state.news=related.slice(0,8); document.getElementById('news').innerHTML=state.news.map(n=>`<div class="news"><a href="${n.url}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a><div class="meta">${escapeHtml(n.source)} / ${n.time||''}</div><div class="small">🇯🇵 ${escapeHtml(jpNewsSummary(n))}</div></div>`).join('')||'<div class="small">関連ニュースなし</div>';}
function escapeHtml(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function makePost(){const mode=document.getElementById('postMode').value;const label={morning:'朝の観測',noon:'昼の観測',night:'夜の観測',alert:'異常検知'}[mode];const top=state.ranking.slice(0,5);const rising=state.ranking.filter(r=>r.delta>0).sort((a,b)=>b.delta-a.delta).slice(0,3);const news=state.news.slice(0,3);let lines=[];lines.push(`**【${label}】**\n`);lines.push(`世界異変ランキングを更新。\n`);top.forEach((r,i)=>{const d=r.delta>0?`↑${r.delta}`:r.delta<0?`↓${Math.abs(r.delta)}`:'→';lines.push(`**${String(i+1).padStart(2,'0')} ${r.flag} ${r.name}　${r.score}（${d}）**`);});lines.push('');if(rising.length){lines.push(`本日の急上昇は、${rising.map(r=>`${r.flag}${r.name}（↑${r.delta}）`).join('、')}。`)}lines.push('');if(news.length){lines.push('📰 **関連ニュース要約**');news.forEach(n=>lines.push(`・${jpNewsSummary(n)}`));lines.push('');}lines.push('数値はGDELT危機報道と地域別観測値をもとに独自算出。');lines.push('小さな変化を見逃さず、世界の流れを継続観測します。\n');lines.push('#終末観測盤 #世界異変ランキング #終末観測 #世界終末指数 #GDELT #国際情勢 #世界ニュース #地政学 #危機管理 #異変検知 #GlobalRisk #Geopolitics #BreakingNews #観測継続中');document.getElementById('postText').value=lines.join('\n');}
async function refresh(){try{const articles=await fetchGdelt();state.ranking=scoreRegions(articles);render();makePost();log(`取得完了: ${articles.length}件`);}catch(e){log('取得失敗。デモ値に切替: '+e.message);state.ranking=scoreRegions([]);render();makePost();}}
document.getElementById('refreshBtn').onclick=refresh;document.getElementById('makePostBtn').onclick=makePost;document.getElementById('postMode').onchange=makePost;document.getElementById('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(document.getElementById('postText').value);log('投稿文をコピーしました')};refresh();setInterval(refresh,15*60*1000);
</script></body></html>
