<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終末観測盤｜リアルタイム危機観測</title>
<style>
:root{--bg:#050506;--panel:#0b0b0d;--red:#ff2638;--red2:#7a111a;--text:#f2f2f2;--muted:#a8a8a8;--blue:#7cc7ff}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#1b0608,#050506 45%,#000);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;letter-spacing:.03em}.wrap{max-width:920px;margin:0 auto;padding:22px 16px 70px}.head{border:1px solid #451016;background:linear-gradient(180deg,#120407,#070707);padding:18px;margin-bottom:18px;box-shadow:0 0 30px #3b050a}.kicker{color:#ff7c88;font-size:12px;letter-spacing:.25em}.title{font-size:32px;font-weight:900;margin:8px 0;text-shadow:3px 3px 0 #8a0010}.status{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:13px}.card{border:1px solid #451016;background:rgba(8,8,10,.92);padding:18px;margin:16px 0}.section-title{font-size:22px;font-weight:900;border-left:10px solid var(--red);padding-left:14px;margin:0 0 14px}.rank{display:grid;grid-template-columns:46px 1fr 60px 58px;align-items:center;gap:10px;border-bottom:1px solid #272727;padding:12px 0}.rank:last-child{border-bottom:0}.no{font-weight:900;color:var(--red);font-size:22px}.name{font-size:22px;font-weight:850}.meta{font-size:12px;color:#ff9aa2;margin-top:3px}.score{font-size:28px;font-weight:950;text-align:right}.chg{text-align:right;font-size:21px}.up{color:#ff7c88}.down{color:#8cd3ff}.flat{color:#aaa}.news{border-top:1px solid #252525;padding:12px 0}.news b{display:block;margin-bottom:5px}.news a{color:#ff9aa2;text-decoration:none;font-size:12px;word-break:break-all}.postbox{white-space:pre-wrap;border:1px solid #4e151d;background:#050505;padding:16px;max-height:420px;overflow:auto;line-height:1.8}.btns{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}.btn{border:1px solid var(--red);background:#130306;color:#fff;padding:10px 14px;font-weight:800;border-radius:0}.log{font-family:ui-monospace,monospace;color:#cfcfcf;font-size:13px;white-space:pre-wrap}.disclaimer{color:#888;font-size:12px;line-height:1.8}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:700px){.grid{grid-template-columns:1fr}.title{font-size:27px}.rank{grid-template-columns:42px 1fr 54px 50px}.name{font-size:20px}.score{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">REALTIME OBSERVATION / GDELT VIA VERCEL API</div>
    <div class="title">終末観測盤</div>
    <div class="status"><span id="clock">--</span><span id="fetchStatus">初期化中</span><span>15分ごと自動更新</span></div>
  </div>

  <div class="card">
    <h2 class="section-title">世界異変ランキング TOP20</h2>
    <div id="ranking"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2 class="section-title">関連ニュース要約</h2>
      <div id="news"></div>
    </div>
    <div class="card">
      <h2 class="section-title">観測ログ</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">半自動投稿文</h2>
    <div class="btns">
      <button class="btn" onclick="setPostMode('朝')">朝</button>
      <button class="btn" onclick="setPostMode('昼')">昼</button>
      <button class="btn" onclick="setPostMode('夜')">夜</button>
      <button class="btn" onclick="copyPost()">コピー</button>
      <button class="btn" onclick="loadData(true)">手動更新</button>
    </div>
    <div class="postbox" id="postText"></div>
  </div>

  <p class="disclaimer">免責：本サイトは公開ニュース情報をもとにした独自指標です。予測・投資判断・安全保障判断を保証するものではありません。航空機個体追跡や個人行動の特定には使用しないでください。</p>
</div>
<script>
const REGIONS = [
  {key:'ukraine', name:'🇺🇦 ウクライナ', terms:['ukraine','kyiv','zelensky','kharkiv','odesa'], base:24},
  {key:'russia', name:'🇷🇺 ロシア', terms:['russia','moscow','putin','kremlin'], base:22},
  {key:'china', name:'🇨🇳 中国', terms:['china','beijing','xi jinping','pla'], base:18},
  {key:'israel', name:'🇮🇱 イスラエル周辺', terms:['israel','gaza','hamas','jerusalem','west bank'], base:20},
  {key:'iran', name:'🇮🇷 イラン', terms:['iran','tehran','irgc','hormuz'], base:18},
  {key:'taiwan', name:'🇹🇼 台湾海峡', terms:['taiwan','taiwan strait'], base:14},
  {key:'northkorea', name:'🇰🇵 北朝鮮', terms:['north korea','pyongyang','kim jong'], base:14},
  {key:'blacksea', name:'🌊 黒海周辺', terms:['black sea','crimea','sevastopol'], base:15},
  {key:'redsea', name:'🌊 紅海周辺', terms:['red sea','houthi','yemen','suez'], base:15},
  {key:'sudan', name:'🇸🇩 スーダン', terms:['sudan','khartoum','darfur'], base:18},
  {key:'congo', name:'🇨🇩 コンゴ民主共和国', terms:['congo','drc','kinshasa','goma'], base:17},
  {key:'myanmar', name:'🇲🇲 ミャンマー', terms:['myanmar','burma','yangon'], base:16},
  {key:'pakistan', name:'🇵🇰 パキスタン', terms:['pakistan','islamabad'], base:13},
  {key:'india', name:'🇮🇳 インド', terms:['india','new delhi'], base:13},
  {key:'venezuela', name:'🇻🇪 ベネズエラ', terms:['venezuela','caracas','maduro'], base:12},
  {key:'bolivia', name:'🇧🇴 ボリビア', terms:['bolivia','la paz'], base:12},
  {key:'serbia', name:'🇷🇸 セルビア', terms:['serbia','belgrade','kosovo'], base:12},
  {key:'haiti', name:'🇭🇹 ハイチ', terms:['haiti','port-au-prince'], base:15},
  {key:'us', name:'🇺🇸 米国本土', terms:['united states','washington','trump','biden','america'], base:10},
  {key:'japan', name:'🇯🇵 日本周辺', terms:['japan','tokyo','okinawa'], base:8}
];
const WEIGHTS = [
  ['nuclear',28],['missile',16],['drone',12],['airstrike',14],['attack',10],['explosion',10],['blockade',18],['sanction',8],['war',9],['military',7],['border',6],['ceasefire',-7],['talks',-4],['aid',-3],['humanitarian',-3]
];
let current = [], articles = [], mode = '昼';
function log(s){const el=document.getElementById('log');el.textContent = `[${new Date().toLocaleTimeString('ja-JP')}] ${s}\n` + el.textContent;}
function norm(s){return (s||'').toLowerCase();}
function scoreRegion(region, arts){
  let hits=0, kw=0, related=[];
  for(const a of arts){
    const text=norm([a.title,a.seendate,a.sourcecountry,a.domain,a.url].join(' '));
    if(region.terms.some(t=>text.includes(t))){
      hits++; related.push(a);
      for(const [w,v] of WEIGHTS) if(text.includes(w)) kw += v;
    }
  }
  const volume = Math.min(28, Math.sqrt(hits)*7);
  const unusual = Math.max(0, volume + kw/5 - region.base/3);
  let score = Math.round(region.base + unusual);
  score = Math.max(0, Math.min(94, score));
  if(hits >= 18 && kw > 80) score = Math.min(98, score + 8);
  return { ...region, score, hits, kw, related: related.slice(0,3) };
}
function getPrev(){try{return JSON.parse(localStorage.getItem('doomPrev')||'{}')}catch{return {}}}
function savePrev(list){const obj={};list.forEach(r=>obj[r.key]=r.score);localStorage.setItem('doomPrev',JSON.stringify(obj));}
function calc(arts){const prev=getPrev();let list=REGIONS.map(r=>scoreRegion(r,arts));list=list.map(r=>({...r, change: prev[r.key]===undefined ? 0 : r.score-prev[r.key]})).sort((a,b)=>b.score-a.score).slice(0,20);savePrev(list);return list;}
function renderRanking(){document.getElementById('ranking').innerHTML=current.map((r,i)=>`<div class="rank"><div class="no">${String(i+1).padStart(2,'0')}</div><div><div class="name">${r.name}</div><div class="meta">危機報道 ${r.hits}件 / 重大語 ${r.kw}</div></div><div class="score">${r.score}</div><div class="chg ${r.change>0?'up':r.change<0?'down':'flat'}">${r.change>0?'↑ '+r.change:r.change<0?'↓ '+Math.abs(r.change):'→'}</div></div>`).join('');}
function jpSummary(a){
  const title=a.title||'関連ニュース'; const t=norm(title);
  let s='関連報道が確認され、地域情勢への警戒が続いています。';
  if(t.includes('missile')) s='ミサイル関連の報道が確認され、軍事的緊張が意識されています。';
  else if(t.includes('attack')||t.includes('airstrike')) s='攻撃・空爆に関する報道が確認され、現地の安全保障リスクが高まっています。';
  else if(t.includes('ceasefire')) s='停戦や協議に関する報道が出ていますが、情勢はなお流動的です。';
  else if(t.includes('sanction')) s='制裁や外交圧力に関する報道が確認されています。';
  return s;
}
function renderNews(){
  const top=current.slice(0,5).flatMap(r=>r.related.map(a=>({a,r}))).slice(0,8);
  document.getElementById('news').innerHTML=top.length?top.map(({a,r})=>`<div class="news"><b>${r.name}</b><div>${jpSummary(a)}</div><div style="color:#bbb;font-size:12px;margin-top:4px">${a.title||''}</div><a href="${a.url}" target="_blank">元記事を開く</a></div>`).join(''):'関連ニュースが取得できませんでした。';
}
function makePost(){
  const top=current.slice(0,5); const rising=current.filter(r=>r.change>0).sort((a,b)=>b.change-a.change).slice(0,3);
  const news=current.slice(0,4).flatMap(r=>r.related.map(a=>({r,a}))).slice(0,3);
  const lines=[];
  lines.push(`【${mode}の観測】`); lines.push('');
  lines.push('世界異変ランキングを更新。'); lines.push('');
  top.forEach((r,i)=>lines.push(`${String(i+1).padStart(2,'0')} ${r.name} ${r.score}（${r.change>0?'↑'+r.change:r.change<0?'↓'+Math.abs(r.change):'→'}）`));
  if(rising.length){lines.push('');lines.push(`本日の急上昇は、${rising.map(r=>r.name.replace(/^.. /,'')+'（↑'+r.change+'）').join('、')}。`)}
  if(news.length){lines.push('');lines.push('関連ニュース：'); news.forEach(({r,a})=>lines.push(`・${r.name.replace(/^.. /,'')}：${jpSummary(a)}`));}
  lines.push(''); lines.push('数値はGDELT危機報道と地域別観測値をもとに独自算出。'); lines.push('変化の兆候を継続観測します。'); lines.push('');
  lines.push('#終末観測盤 #世界異変ランキング #終末観測 #世界終末指数 #GDELT #国際情勢 #世界ニュース #地政学 #危機管理 #GlobalRisk #Geopolitics #BreakingNews');
  return lines.join('\n');
}
function renderPost(){document.getElementById('postText').textContent=makePost();}
function setPostMode(m){mode=m;renderPost();}
async function copyPost(){await navigator.clipboard.writeText(document.getElementById('postText').textContent);alert('コピーしました');}
function demo(){return [{title:'Ukraine Russia missile attack reported near border',url:'#'},{title:'China military activity raises concern near Taiwan Strait',url:'#'},{title:'Iran sanctions and nuclear talks continue',url:'#'},{title:'Red Sea shipping attack fears continue',url:'#'},{title:'Sudan conflict humanitarian crisis report',url:'#'}]}
async function loadData(manual=false){
  document.getElementById('clock').textContent=new Date().toLocaleString('ja-JP');
  document.getElementById('fetchStatus').textContent='取得中'; log('GDELT取得開始');
  try{
    const r=await fetch('/api/gdelt');
    const j=await r.json();
    if(!j.ok) throw new Error(j.error||'API error');
    articles=(j.data.articles||[]); log(`GDELT取得成功: ${articles.length}件`); document.getElementById('fetchStatus').textContent=`実データ ${articles.length}件`;
  }catch(e){
    log('取得失敗。デモ値に切替: '+e.message); document.getElementById('fetchStatus').textContent='取得失敗 / デモ表示'; articles=demo();
  }
  current=calc(articles); renderRanking(); renderNews(); renderPost();
}
loadData(); setInterval(loadData,15*60*1000);
</script>
</body>
</html>
