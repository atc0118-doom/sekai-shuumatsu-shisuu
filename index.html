<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>終末観測盤 2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">WORLD RISK OBSERVATORY</p>
        <h1>終末観測盤 2.0</h1>
        <p class="sub">世界情勢を30秒で読むための観測システム</p>
      </div>
      <div class="clock"><span id="updated">更新確認中</span></div>
    </header>

    <section class="hero card">
      <div class="hero-left">
        <p class="label">世界終末指数</p>
        <div class="score-row"><span id="score" class="score">--</span><span class="slash">/100</span></div>
        <div id="level" class="level">観測中</div>
        <div id="delta" class="delta">24時間変動 --</div>
      </div>
      <div class="hero-right">
        <div class="meter"><div id="meterFill"></div></div>
        <p id="summary" class="summary">世界ニュースを取得しています。</p>
      </div>
    </section>

    <section class="grid-main">
      <section class="card priority">
        <div class="section-head">
          <p class="label">TODAY</p>
          <h2>本日の注目ニュース</h2>
        </div>
        <div id="topNews" class="news-list skeleton">取得中...</div>
      </section>

      <section class="card ai">
        <div class="section-head">
          <p class="label">AI OBSERVER</p>
          <h2>AI観測分析</h2>
        </div>
        <p id="aiText">観測データを解析中です。</p>
      </section>
    </section>

    <section class="grid-main second">
      <section class="card">
        <div class="section-head">
          <p class="label">RANKING</p>
          <h2>世界異変ランキング TOP10</h2>
        </div>
        <div id="ranking" class="ranking skeleton">取得中...</div>
      </section>

      <section class="card">
        <div class="section-head">
          <p class="label">TREND</p>
          <h2>7日推移</h2>
        </div>
        <svg id="trend" class="trend" viewBox="0 0 320 120" preserveAspectRatio="none"></svg>
      </section>
    </section>

    <section class="card sources">
      <div class="section-head">
        <p class="label">SOURCES</p>
        <h2>観測ソース</h2>
      </div>
      <p>公開ニュース・国際情勢データをもとに独自算出。数値は予測や保証ではありません。</p>
    </section>

    <section id="adminPanel" class="card admin">
      <div class="section-head">
        <p class="label">ADMIN</p>
        <h2>投稿ライター</h2>
      </div>
      <div class="buttons">
        <button onclick="makePost('朝')">朝</button>
        <button onclick="makePost('昼')">昼</button>
        <button onclick="makePost('夜')">夜</button>
        <button onclick="makePost('速報')">速報</button>
        <button onclick="makePost('AI')">AI観測</button>
        <button onclick="copyPost()">コピー</button>
      </div>
      <textarea id="postText" rows="10">投稿文生成待機中</textarea>
    </section>
  </main>
  <script src="gdelt.js"></script>
</body>
</html>
