<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>終末観測盤</title><style>
:root{--bg:#050609;--panel:#11131a;--red:#e50914;--text:#e8e8e8;--muted:#8f96a3;--line:#2b2f3a}body{margin:0;background:radial-gradient(circle at top,#161923,#050609 60%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:980px;margin:auto;padding:24px}.head{border:1px solid var(--line);background:linear-gradient(180deg,#171a22,#0b0d12);padding:20px}.logo{font-size:34px;font-weight:900;letter-spacing:.12em;color:var(--red)}.sub{color:var(--muted);margin-top:6px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}@media(max-width:800px){.grid{grid-template-columns:1fr}.logo{font-size:28px}}.card{border:1px solid var(--line);background:rgba(17,19,26,.92);padding:16px}.score{font-size:76px;font-weight:900;color:var(--red);line-height:1}.level{font-size:18px;letter-spacing:.18em}.row{display:grid;grid-template-columns:46px 1fr 48px 54px;gap:8px;padding:11px 0;border-bottom:1px solid #252936;align-items:center}.rank{color:var(--red);font-weight:800}.muted{color:var(--muted)}.news{padding:10px 0;border-bottom:1px solid #252936}.news a{color:#dbe8ff;text-decoration:none}.log{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#b6bdc8;white-space:pre-wrap}.foot{margin-top:14px;color:var(--muted);font-size:12px}.pill{display:inline-block;border:1px solid var(--line);padding:4px 8px;color:var(--muted);font-size:12px;margin-top:8px}
</style></head><body><div class="wrap"><div class="head"><div class="logo">終末観測盤</div><div class="sub">WORLD ANOMALY RANKING / PUBLIC OBSERVATION MODE</div><span class="pill" id="updated">更新準備中</span></div><div class="grid"><section class="card"><div class="level">警戒水準</div><div class="score" id="mainScore">--</div><div class="muted" id="mainNote">GDELT危機報道を取得中</div></section><section class="card"><b>観測ログ</b><div class="log" id="log">初期化中...</div></section></div><section class="card" style="margin-top:16px"><h2>世界異変ランキング TOP20</h2><div id="ranking"></div></section><section class="card" style="margin-top:16px"><h2>関連ニュース</h2><div id="news"></div></section><div class="foot">※公開情報をもとに独自算出した観測指標です。予測・保証ではありません。</div></div><script>
const REGIONS=[['🇺🇦','ウクライナ',['ukraine','kyiv','zelensky']],['🇷🇺','ロシア',['russia','moscow','putin']],['🇮🇱','イスラエル周辺',['israel','gaza','hamas','hezbollah']],['🇮🇷','イラン',['iran','tehran','hormuz']],['🇹🇼','台湾海峡',['taiwan','taipei','strait']],['🇨🇳','中国',['china','beijing','pla']],['🌊','黒海周辺',['black sea','crimea','odessa']],['🌊','紅海周辺',['red sea','houthi','yemen']],['🇰🇵','北朝鮮',['north korea','pyongyang','kim jong']],['🇸🇩','スーダン',['sudan','khartoum']],['🇨🇩','コンゴ民主共和国',['congo','drc','kinshasa']],['🇲🇲','ミャンマー',['myanmar','burma']],['🇵🇰','パキスタン',['pakistan','islamabad']],['🇮🇳','インド',['india','new delhi']],['🇻🇪','ベネズエラ',['venezuela','caracas']],['🇷🇸','セルビア',['serbia','belgrade']],['🇺🇸','米国本土',['united states','washington','america']],['🇧🇴','ボリビア',['bolivia']],['🇭🇹','ハイチ',['haiti']],['🇯🇵','日本周辺',['japan','tokyo','okinawa']]];
const SEV={nuclear:22, missile:12, drone:8, attack:8, war:7, conflict:6, sanctions:4, blockade:14, coup:10, crisis:5, ceasefire:-6, talks:-3, aid:-2};
function scoreRegion(arts, r){let count=0,severity=0,items=[]; for(const a of arts){const t=((a.title||'')+' '+(a.seendate||'')+' '+(a.domain||'')).toLowerCase(); const url=(a.url||'').toLowerCase(); const body=t+' '+url; if(r[2].some(k=>body.includes(k))){count++; items.push(a); for(const [k,v] of Object.entries(SEV)) if(body.includes(k)) severity+=v;}} const raw=Math.round(18+Math.sqrt(count)*11+Math.min(38,severity)); return {flag:r[0],name:r[1],score:Math.max(0,Math.min(94,raw)),count,items};}
function jpSummary(a){let title=a.title||'関連ニュース'; return title.replace(/\s+/g,' ').slice(0,95);}
async function load(){const log=[]; try{log.push('GDELT取得開始'); const res=await fetch('/api/gdelt'); const data=await res.json(); if(!data.ok) throw new Error(data.error||'API error'); const arts=data.articles||[]; log.push(`取得成功: ${arts.length}件`); const ranked=REGIONS.map(r=>scoreRegion(arts,r)).sort((a,b)=>b.score-a.score).slice(0,20); document.getElementById('mainScore').textContent=ranked[0]?.score||0; document.getElementById('mainNote').textContent=`${ranked[0]?.flag||''} ${ranked[0]?.name||''} を最上位に観測`; document.getElementById('ranking').innerHTML=ranked.map((x,i)=>`<div class=row><div class=rank>${String(i+1).padStart(2,'0')}</div><div>${x.flag} ${x.name}</div><div><b>${x.score}</b></div><div class=muted>${x.count}件</div></div>`).join(''); const news=ranked.flatMap(x=>x.items.slice(0,2).map(a=>({...a,region:x.name,flag:x.flag}))).slice(0,8); document.getElementById('news').innerHTML=news.map(a=>`<div class=news><div class=muted>${a.flag} ${a.region} / ${a.domain||''}</div><a href="${a.url}" target="_blank" rel="noreferrer">${jpSummary(a)}</a></div>`).join('')||'<div class=muted>関連ニュースなし</div>'; document.getElementById('updated').textContent='JST '+new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'}); log.push('公開画面更新完了');}catch(e){log.push('取得失敗: '+e.message); document.getElementById('ranking').innerHTML='<div class=muted>データ取得に失敗しました。時間を置いて再読み込みしてください。</div>';} document.getElementById('log').textContent=log.join('\n');}
load(); setInterval(load,15*60*1000);
</script></body></html>
