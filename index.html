<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>終末観測盤 Ver6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <p class="kicker">REALTIME OBSERVATION / MULTI SOURCE VIA VERCEL API</p>
      <h1>終末観測盤</h1>
      <p><span id="now">--</span>　<span id="status">取得待機中</span></p>
      <p>15分ごと自動更新 / 429対策版</p>
    </section>

    <section class="panel score-panel">
      <p>現在指数</p>
      <strong id="globalScore">--</strong>
      <p id="levelText">--</p>
      <div class="meter"><span id="meterBar"></span></div>
    </section>

    <section class="panel">
      <h2>世界異変ランキング TOP20</h2>
      <div id="ranking">読み込み中...</div>
    </section>

    <section class="panel">
      <h2>観測ニュース</h2>
      <div id="newsList">ニュース取得待機中...</div>
    </section>

    <section class="panel">
      <h2>観測ログ</h2>
      <pre id="logs">待機中</pre>
    </section>

    <section id="adminPanel" class="panel admin-panel">
      <h2>半自動投稿文</h2>
      <div class="buttons">
        <button onclick="makePost('朝')">朝</button>
        <button onclick="makePost('昼')">昼</button>
        <button onclick="makePost('夜')">夜</button>
        <button onclick="copyPost()">コピー</button>
      </div>
      <textarea id="postText" rows="9">投稿文生成待機中</textarea>
    </section>

    <footer>公開情報をもとにした独自算出。予測・保証ではありません。</footer>
  </main>
  <script src="gdelt.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get("admin") !== "doom") {
      const p = document.getElementById("adminPanel");
      if (p) p.style.display = "none";
    }
  </script>
</body>
</html>
