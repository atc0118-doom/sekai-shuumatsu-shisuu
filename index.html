<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>終末観測盤 V10</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="wrap">
  <section class="hero card">
    <p class="kicker">REALTIME OBSERVATION / WORLD ANOMALY BOARD</p>
    <h1>終末観測盤</h1>
    <p><span id="now">--</span>　<span id="status">観測継続中</span></p>
    <p>15分ごと自動更新</p>
  </section>

  <section class="card score-card">
    <p>現在指数</p>
    <div class="score-row"><strong id="globalScore">--</strong><span id="levelText">--</span></div>
    <div class="meter"><div id="meterFill"></div></div>
  </section>

  <section class="card">
    <h2>世界異変ランキング TOP20</h2>
    <div id="ranking" class="ranking">読み込み中</div>
  </section>

  <section class="card">
    <h2>観測ニュース</h2>
    <div id="newsList" class="news">読み込み中</div>
  </section>

  <section class="card">
    <h2>観測ログ</h2>
    <pre id="logs">観測開始</pre>
  </section>

  <section id="adminPanel" class="card admin-panel">
    <h2>半自動投稿文</h2>
    <div class="buttons">
      <button onclick="makePost('朝')">朝</button>
      <button onclick="makePost('昼')">昼</button>
      <button onclick="makePost('夜')">夜</button>
      <button onclick="makePost('緊急')">緊急</button>
      <button onclick="makePost('AI')">AI観測</button>
      <button onclick="copyPost()">コピー</button>
    </div>
    <textarea id="postText" rows="10">投稿文生成待機中</textarea>
  </section>

  <footer>公開情報をもとにした独自算出。予測・保証ではありません。</footer>
</main>
<script src="gdelt.js"></script>
</body>
</html>
