<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>終末観測盤 / 世界終末指数</title>
<style>
:root{--bg:#070000;--paper:#120303;--red:#e30012;--red2:#7b0008;--white:#f2e8e8;--muted:#9b7777;--line:#5c0b0b;--dark:#000;}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% 0,#2b0204 0,#060000 42%,#000 100%);color:var(--white);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans JP','Yu Gothic',sans-serif;letter-spacing:.04em;}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 4px),repeating-linear-gradient(90deg,rgba(227,0,18,.035) 0 1px,transparent 1px 9px);mix-blend-mode:screen;pointer-events:none;opacity:.55;z-index:10}.wrap{max-width:1180px;margin:auto;padding:18px}.top{border:2px solid var(--red);padding:22px;background:linear-gradient(135deg,rgba(227,0,18,.16),rgba(0,0,0,.88));box-shadow:0 0 28px rgba(227,0,18,.35),inset 0 0 45px rgba(227,0,18,.12);position:relative;overflow:hidden}.logo{font-weight:900;font-size:clamp(44px,10vw,116px);line-height:.86;letter-spacing:-.08em;position:relative;text-shadow:6px 5px 0 #000, -5px -3px 0 var(--red), 0 0 16px rgba(227,0,18,.65)}.logo:after{content:"終末観測盤";position:absolute;left:12px;top:7px;color:transparent;-webkit-text-stroke:1px var(--red);opacity:.7;z-index:-1}.sub{margin-top:12px;color:#ffb5b5;font-weight:700}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tag{border:1px solid var(--red);padding:6px 10px;background:#160102;color:#ffd0d0;font-size:12px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}.card{background:linear-gradient(180deg,rgba(24,2,3,.95),rgba(3,0,0,.96));border:1px solid var(--line);padding:16px;box-shadow:0 0 18px rgba(227,0,18,.16)}.card h2{margin:0 0 12px;color:#fff;font-size:18px;border-bottom:1px solid var(--red);padding-bottom:8px;text-shadow:2px 1px 0 var(--red)}.doom{font-size:clamp(72px,18vw,170px);font-weight:900;line-height:.9;color:#fff;text-shadow:7px 5px 0 var(--red),0 0 22px rgba(227,0,18,.6)}.level{font-size:34px;font-weight:900;color:#ff2c39;animation:pulse 1.8s infinite}.meter{height:16px;border:1px solid var(--red);background:#140000;margin:12px 0;position:relative;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#5a0000,#e30012,#fff);width:55%;box-shadow:0 0 18px var(--red)}@keyframes pulse{50%{opacity:.55;text-shadow:0 0 22px #f00}}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #4d0909;padding:12px;background:#080000}.metric b{display:block;font-size:13px;color:#ff9b9b}.metric span{font-size:32px;font-weight:900;color:#fff;text-shadow:3px 2px 0 var(--red)}.map{height:260px;border:1px solid var(--red);position:relative;background:radial-gradient(circle at 50% 50%,#260006,#050000 62%);overflow:hidden}.map svg{position:absolute;inset:0;width:100%;height:100%;opacity:.66}.land{fill:none;stroke:#8b1b1b;stroke-width:2}.marker{position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--red);box-shadow:0 0 18px 8px rgba(227,0,18,.62);animation:blink 1.1s infinite}.marker:after{content:attr(data-name);position:absolute;left:18px;top:-9px;white-space:nowrap;color:#ffd1d1;font-size:12px;font-weight:800}.me{left:57%;top:46%}.tw{left:74%;top:49%}.bs{left:53%;top:35%}.jp{left:81%;top:44%}.us{left:19%;top:43%}@keyframes blink{50%{transform:scale(1.65);opacity:.45}}.regions{display:grid;gap:8px}.region{display:grid;grid-template-columns:90px 1fr 45px;align-items:center;gap:8px}.bar{height:12px;border:1px solid #8a1717;background:#100}.bar i{display:block;height:100%;background:linear-gradient(90deg,#4b0000,#e30012,#fff)}.high{color:#ff2634;font-weight:900}.mid{color:#ff9b9b}.low{color:#bbb}.omens li,.logs li{margin:8px 0;color:#ffe4e4}.archive{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.event{border:1px solid #5c0b0b;background:#090000;padding:12px;position:relative}.event:before{content:"ARCHIVE";position:absolute;right:8px;top:6px;color:#6b1b1b;font-size:10px;font-weight:900}.event .year{color:#ff7676;font-size:12px}.event .name{font-weight:900;margin:5px 0}.event .score{font-size:38px;font-weight:900;text-shadow:3px 2px 0 var(--red)}.event .near{color:#fff;background:#8b0008;padding:3px 6px;font-size:11px;display:inline-block}.compare{font-size:15px;color:#ffd0d0;line-height:1.8}.footer{margin-top:16px;color:#9b7777;border-top:1px solid #3b0606;padding-top:12px;font-size:12px}@media(max-width:820px){.grid{grid-template-columns:1fr}.archive{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.logo{letter-spacing:-.1em}.map{height:220px}}
</style>
</head>
<body>
<div class="wrap">
<header class="top">
  <div class="logo">終末観測盤</div>
  <div class="sub">世界終末指数 / SAT-SYS-01</div>
  <div class="nav"><span class="tag">世界終末指数</span><span class="tag">方面別災厄指数</span><span class="tag">終末観測アーカイブ</span><span class="tag">非公開</span></div>
</header>

<section class="grid">
  <div class="card">
    <h2>災厄合成指数</h2>
    <div class="doom" id="doom">--</div>
    <div class="level">警戒水準 <span id="roman">--</span> / <span id="level">取得中</span></div>
    <div class="meter"><div class="fill" id="doomFill"></div></div>
    <div class="compare" id="nearest">過去記録照合中...</div>
  </div>
  <div class="card">
    <h2>観測値</h2>
    <div class="metrics">
      <div class="metric"><b>空のざわめき</b><span id="air">--</span></div>
      <div class="metric"><b>市場の怯え</b><span id="market">--</span></div>
      <div class="metric"><b>海運の乱れ</b><span id="shipping">--</span></div>
      <div class="metric"><b>太陽の異変</b><span id="solar">--</span></div>
    </div>
  </div>
</section>

<section class="grid">
 <div class="card">
  <h2>方面別災厄指数</h2>
  <div class="map">
    <svg viewBox="0 0 1000 500" preserveAspectRatio="none"><path class="land" d="M80 210 C130 140 210 130 285 180 C340 220 360 270 315 315 C245 355 155 330 105 285 Z M410 170 C470 130 560 130 635 175 C700 215 720 280 660 330 C575 385 455 345 410 270 Z M690 155 C760 120 880 150 930 220 C965 275 900 340 810 325 C725 310 660 235 690 155 Z M690 340 C740 320 815 350 850 395 C800 430 730 420 690 340 Z"/></svg>
    <div class="marker me" data-name="中東"></div><div class="marker tw" data-name="台湾海峡"></div><div class="marker bs" data-name="黒海"></div><div class="marker jp" data-name="日本周辺"></div><div class="marker us" data-name="米国本土"></div>
  </div>
 </div>
 <div class="card">
  <h2>方角別観測記録</h2>
  <div class="regions" id="regions"></div>
 </div>
</section>

<section class="grid">
 <div class="card">
  <h2>本日の凶兆</h2>
  <ul class="omens" id="omens"><li>観測値を照合中</li></ul>
 </div>
 <div class="card">
  <h2>最新の観測ログ</h2>
  <ul class="logs" id="logs"><li>記録生成中</li></ul>
 </div>
</section>

<section class="card">
 <h2>終末観測アーカイブ</h2>
 <div class="archive" id="archive"></div>
</section>

<div class="footer">この観測盤は公開情報と簡易推定をもとに災厄指数を生成する。未来を予言するものではない。</div>
</div>

<script>
const archives=[
 {year:'2001',name:'9.11同時多発攻撃',score:91,note:'航空・市場・軍事反応が急変'},
 {year:'2008',name:'金融危機',score:84,note:'市場の怯えが極端に増幅'},
 {year:'2011',name:'東日本大震災',score:88,note:'日本周辺・物流・電力不安が急上昇'},
 {year:'2020',name:'世界的感染拡大',score:86,note:'航空停止と市場急変'},
 {year:'2022',name:'ウクライナ侵攻',score:89,note:'黒海方面と市場が急上昇'},
 {year:'2023',name:'中東衝突拡大',score:82,note:'中東方面の緊張上昇'}
];
function roman(score){if(score>=85)return 'Ⅴ'; if(score>=70)return 'Ⅳ'; if(score>=50)return 'Ⅲ'; if(score>=30)return 'Ⅱ'; return 'Ⅰ'}
function label(score){if(score>=85)return '異常'; if(score>=70)return '危険'; if(score>=50)return '警戒'; if(score>=30)return '注意'; return '平常'}
function clamp(n){return Math.max(0,Math.min(100,Math.round(Number.isFinite(n)?n:0)))}
function val(x, fallback=50){return typeof x==='number'?x:(x&&typeof x.value==='number'?x.value:fallback)}
function fallback(){const t=Date.now()/100000;const air=clamp(60+Math.sin(t*1.2)*18);const market=clamp(49+Math.cos(t*.8)*15);const shipping=clamp(55+Math.sin(t*.7)*13);const solar=clamp(38+Math.cos(t*1.5)*20);const doom=clamp(air*.38+market*.24+shipping*.23+solar*.15);return {ok:true,doom,level:label(doom),metrics:{air,market,shipping,solar},source:'local'}}
function normalize(d){const m=d.metrics||{};const air=val(m.air),market=val(m.market),shipping=val(m.shipping),solar=val(m.solar);const doom=clamp(typeof d.doom==='number'?d.doom:(air*.38+market*.24+shipping*.23+solar*.15));return {...d,doom,level:d.level||label(doom),metrics:{air,market,shipping,solar}}}
async function getData(){try{const r=await fetch('/api/doom?ts='+Date.now(),{cache:'no-store'});const d=await r.json();if(!d||typeof d.doom!=='number')throw new Error('bad');return normalize(d)}catch(e){return fallback()}}
function regionScores(d){const m=d.metrics||{};return [
 ['中東方面',clamp(m.air*.45+m.shipping*.35+m.market*.2+12)],
 ['台湾海峡方面',clamp(m.air*.5+m.shipping*.25+m.solar*.1+8)],
 ['黒海方面',clamp(m.air*.38+m.market*.28+m.shipping*.22+6)],
 ['日本周辺',clamp(m.air*.3+m.solar*.35+m.shipping*.2)],
 ['北極圏方面',clamp(m.solar*.45+m.air*.2+10)],
 ['米国本土方面',clamp(m.market*.45+m.air*.25+m.solar*.15)]
].sort((a,b)=>b[1]-a[1])}
function renderRegions(rs){document.getElementById('regions').innerHTML=rs.map(([n,s])=>`<div class="region"><b>${n}</b><div class="bar"><i style="width:${s}%"></i></div><span class="${s>=70?'high':s>=50?'mid':'low'}">${s}</span></div>`).join('')}
function renderArchive(current){let nearest=archives.reduce((a,b)=>Math.abs(b.score-current)<Math.abs(a.score-current)?b:a,archives[0]);document.getElementById('nearest').innerHTML=`過去記録照合：現在値は <b>${nearest.name}</b> の観測圏に接近。差分 ${Math.abs(nearest.score-current)}。`;
 document.getElementById('archive').innerHTML=archives.map(e=>`<div class="event"><div class="year">${e.year}</div><div class="name">${e.name}</div><div class="score">${e.score}</div><div>${e.note}</div>${Math.abs(e.score-current)<=8?'<span class="near">現在値接近</span>':''}</div>`).join('')}
function omens(rs,d){const top=rs.slice(0,3);const m=d.metrics||{};let arr=[`${top[0][0]}の災厄指数が上昇`,`${top[1][0]}を重点観測`, m.air>60?'特殊機活動を観測':'航空活動に微細な乱れ', m.market>60?'市場の怯え増幅':'市場反応は限定的', m.shipping>60?'海運の乱れ継続':'海運監視継続'].slice(0,4);document.getElementById('omens').innerHTML=arr.map(x=>`<li>${x}</li>`).join('')}
function logs(rs,d){const now=new Date();const times=[0,7,13,22].map(min=>new Date(now-min*60000).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));let l=[`${times[0]}　${rs[0][0]}　危険方面として記録`,`${times[1]}　空のざわめき　${d.metrics.air}`,`${times[2]}　市場の怯え　${d.metrics.market}`,`${times[3]}　海運の乱れ　${d.metrics.shipping}`];document.getElementById('logs').innerHTML=l.map(x=>`<li>${x}</li>`).join('')}
async function update(){const d=await getData();const m=d.metrics||{};document.getElementById('doom').textContent=d.doom;document.getElementById('level').textContent=d.level||label(d.doom);document.getElementById('roman').textContent=roman(d.doom);document.getElementById('doomFill').style.width=d.doom+'%';['air','market','shipping','solar'].forEach(k=>document.getElementById(k).textContent=m[k]??'--');const rs=regionScores(d);renderRegions(rs);renderArchive(d.doom);omens(rs,d);logs(rs,d)}
update();setInterval(update,300000);
</script>
</body>
</html>
