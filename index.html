<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>終末観測盤 V7</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero card">
      <p class="kicker">REALTIME OBSERVATION / WORLD ANOMALY MONITOR</p>
      <h1>終末観測盤</h1>
      <p class="meta"><span id="now">--</span>　<span id="status">観測継続中</span></p>
      <p class="sub">公開情報をもとに世界情勢の変化を観測中</p>
    </section>

    <section class="score card">
      <div>
        <p class="label">現在指数</p>
        <div id="globalScore" class="score-num">--</div>
        <p id="levelText" class="level">--</p>
      </div>
      <div class="meter"><span id="meterFill"></span></div>
    </section>

    <section class="card">
      <h2><span></span>世界異変ランキング TOP20</h2>
      <div id="ranking" class="ranking">読み込み中...</div>
    </section>

    <section class="card">
      <h2><span></span>観測ニュース</h2>
      <div id="newsList" class="news">ニュース取得中...</div>
    </section>

    <section class="card log-card">
      <h2><span></span>観測ログ</h2>
      <pre id="logs">観測開始</pre>
    </section>

    <section id="adminPanel" class="card admin-panel">
      <h2><span></span>半自動投稿文</h2>
      <div class="buttons">
        <button onclick="makePost('朝')">朝</button>
        <button onclick="makePost('昼')">昼</button>
        <button onclick="makePost('夜')">夜</button>
        <button onclick="copyPost()">コピー</button>
      </div>
      <textarea id="postText" rows="9">投稿文生成待機中</textarea>
    </section>

    <footer>公開情報をもとにした独自算出。予測・保証ではありません。</footer>
  </main>
  <script src="gdelt.js"></script>
  <script>
    const admin = new URLSearchParams(location.search).get('admin') === 'doom';
    const panel = document.getElementById('adminPanel');
    if (panel && !admin) panel.style.display = 'none';
  </script>
</body>
</html>
