<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>終末観測盤 Ver.2 / SAT-SYS-01</title>
<style>
:root{--bg:#050000;--panel:#100102;--red:#e30012;--red2:#810008;--red3:#360003;--white:#f4eeee;--muted:#b98787;--line:#65090c;--dim:#6f3434}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:var(--white);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans JP','Yu Gothic',sans-serif;letter-spacing:.05em}body{background:radial-gradient(circle at 50% -10%,#360006 0,#080000 44%,#000 100%);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 1px,transparent 1px 4px),repeating-linear-gradient(90deg,rgba(227,0,18,.03) 0 1px,transparent 1px 11px);pointer-events:none;mix-blend-mode:screen;z-index:20}body:after{content:"";position:fixed;inset:-10%;background:radial-gradient(circle,transparent 55%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:19}.wrap{max-width:1180px;margin:auto;padding:16px;position:relative;z-index:1}.top{border:2px solid var(--red);background:linear-gradient(135deg,rgba(227,0,18,.2),rgba(0,0,0,.93));padding:18px 18px 14px;box-shadow:0 0 34px rgba(227,0,18,.32), inset 0 0 46px rgba(227,0,18,.14);position:relative;overflow:hidden}.top:before{content:"SAT-SYS-01 / CIVILIAN DOOM OBSERVATION TERMINAL";position:absolute;left:12px;top:8px;color:#ff9090;font-size:10px;font-weight:900;opacity:.7}.logo{margin-top:18px;font-size:clamp(42px,10vw,112px);line-height:.84;font-weight:950;letter-spacing:-.08em;color:#fff;text-shadow:7px 5px 0 #000,-4px -3px 0 var(--red),0 0 20px rgba(227,0,18,.7)}.subline{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tag{border:1px solid var(--red);background:#170003;color:#ffd1d1;padding:6px 10px;font-size:12px;font-weight:800}.tag.danger{background:var(--red);color:#fff;text-shadow:1px 1px 0 #000}.terminal{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;margin-top:14px}.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(18,1,2,.97),rgba(3,0,0,.98));padding:15px;box-shadow:0 0 20px rgba(227,0,18,.15)}.panel h2{margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--red);font-size:16px;color:#fff;text-shadow:2px 1px 0 var(--red)}.alertHero{text-align:center;padding:10px 0}.alertTitle{font-size:clamp(18px,4vw,30px);font-weight:900;color:#ff9b9b}.roman{font-size:clamp(110px,28vw,230px);font-weight:950;line-height:.78;color:#fff;text-shadow:11px 8px 0 var(--red),0 0 32px rgba(227,0,18,.85);animation:heroPulse 2s infinite}.doomSmall{font-size:34px;font-weight:900;color:#ffd6d6}.delta{display:inline-block;margin-left:10px;padding:3px 8px;border:1px solid var(--red);color:#fff;background:#250004;font-size:15px}.delta.up{background:#8d0008}.delta.down{background:#111;color:#c9baba}.meter{height:18px;border:1px solid var(--red);background:#100;margin:14px 0;overflow:hidden}.fill{height:100%;width:50%;background:linear-gradient(90deg,#400,#e30012,#fff);box-shadow:0 0 22px var(--red)}@keyframes heroPulse{50%{opacity:.82;filter:blur(.2px)}}.statusGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid #4e0709;background:#080000;padding:12px;min-height:86px}.metric b{display:block;color:#ff9999;font-size:13px}.metric .num{font-size:38px;font-weight:950;color:#fff;text-shadow:3px 2px 0 var(--red)}.metric .mini{font-size:12px;color:var(--muted)}.radar{height:420px;border:1px solid var(--red);background:radial-gradient(circle at center,rgba(227,0,18,.16) 0,rgba(80,0,5,.08) 36%,rgba(0,0,0,.98) 70%),#050000;position:relative;overflow:hidden}.radar:before{content:"";position:absolute;inset:28px;border-radius:50%;border:1px solid rgba(227,0,18,.45);box-shadow:0 0 0 58px rgba(227,0,18,.04),0 0 0 116px rgba(227,0,18,.03),0 0 0 174px rgba(227,0,18,.025)}.radar:after{content:"";position:absolute;left:50%;top:50%;width:1px;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(227,0,18,.05));transform-origin:top;animation:sweep 5.5s linear infinite}.crossH,.crossV{position:absolute;background:rgba(227,0,18,.22)}.crossH{height:1px;left:0;right:0;top:50%}.crossV{width:1px;top:0;bottom:0;left:50%}@keyframes sweep{to{transform:rotate(360deg)}}.node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:3}.node .dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--red);box-shadow:0 0 18px 8px rgba(227,0,18,.58);animation:blink 1.2s infinite}.node .name{position:absolute;left:22px;top:-8px;white-space:nowrap;font-size:12px;font-weight:900;color:#ffd2d2;text-shadow:0 0 4px #000,0 0 8px #000}.node .zone{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(227,0,18,.28),rgba(227,0,18,.06) 55%,transparent 72%);z-index:-1}.node.active .name{color:#fff}.node.active .dot{background:#ffeded;box-shadow:0 0 20px 10px rgba(227,0,18,.8)}@keyframes blink{50%{transform:scale(1.75);opacity:.48}}.regions{display:grid;gap:8px}.region{display:grid;grid-template-columns:92px 1fr 44px;gap:8px;align-items:center;border-bottom:1px solid #280305;padding:4px 0}.bar{height:12px;border:1px solid #8a1717;background:#100}.bar i{display:block;height:100%;background:linear-gradient(90deg,#490000,#e30012,#fff)}.score{font-weight:900}.high{color:#ff2634}.mid{color:#ffaaa9}.low{color:#c0b1b1}.detail{border:1px solid #6b080b;background:#090000;padding:12px;margin-top:12px}.detailTitle{font-size:20px;font-weight:950;text-shadow:2px 1px 0 var(--red)}.detailRows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.detailRows div{border:1px solid #350406;padding:8px;background:#070000}.omens li,.logs li{margin:9px 0;color:#ffe1e1}.logs li{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#ffbaba}.archiveTable{width:100%;border-collapse:collapse;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.archiveTable td{border-bottom:1px solid #360406;padding:8px;color:#ffd0d0}.archiveTable td:nth-child(3){font-weight:950;color:#fff;text-shadow:2px 1px 0 var(--red);font-size:20px}.near{background:#8b0008;color:#fff;padding:2px 6px;font-size:11px}.footer{margin-top:14px;color:#9b7777;border-top:1px solid #3b0606;padding-top:12px;font-size:12px}@media(max-width:840px){.terminal{grid-template-columns:1fr}.statusGrid{grid-template-columns:1fr}.radar{height:360px}.logo{letter-spacing:-.1em}.detailRows{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header class="top">
 <div class="logo">終末観測盤</div>
 <div class="subline"><span class="tag danger">警報端末</span><span class="tag">SAT-SYS-01</span><span class="tag">世界終末指数</span><span class="tag">非公開</span></div>
</header>
<section class="terminal">
 <div class="panel alertHero"><h2>警戒水準</h2><div class="roman" id="roman">--</div><div class="doomSmall">災厄合成指数 <span id="doom">--</span><span id="doomDelta" class="delta">--</span></div><div class="meter"><div id="doomFill" class="fill"></div></div><div id="nearest" class="mini">過去記録照合中...</div></div>
 <div class="panel"><h2>観測値</h2><div class="statusGrid">
  <div class="metric"><b>空のざわめき</b><span class="num" id="air">--</span><div class="mini" id="airDelta">--</div></div>
  <div class="metric"><b>市場の怯え</b><span class="num" id="market">--</span><div class="mini" id="marketDelta">--</div></div>
  <div class="metric"><b>海運の乱れ</b><span class="num" id="shipping">--</span><div class="mini" id="shippingDelta">--</div></div>
  <div class="metric"><b>太陽の異変</b><span class="num" id="solar">--</span><div class="mini" id="solarDelta">--</div></div>
 </div></div>
</section>
<section class="terminal">
 <div class="panel"><h2>戦略監視レーダー</h2><div class="radar" id="radar"><div class="crossH"></div><div class="crossV"></div></div></div>
 <div class="panel"><h2>方面別災厄指数</h2><div class="regions" id="regions"></div><div class="detail" id="detail"><div class="detailTitle">方面を選択</div><div class="mini">危険方面を押すと詳細を表示。</div></div></div>
</section>
<section class="terminal">
 <div class="panel"><h2>本日の凶兆</h2><ul class="omens" id="omens"><li>観測値を照合中</li></ul></div>
 <div class="panel"><h2>最新の観測ログ</h2><ul class="logs" id="logs"><li>記録生成中</li></ul></div>
</section>
<section class="panel"><h2>終末観測アーカイブ</h2><table class="archiveTable" id="archive"></table></section>
<div class="footer">この観測盤は公開情報と簡易推定をもとに災厄指数を生成する。未来を予言するものではない。</div>
</div>
<script>
const archives=[['2001','9.11同時多発攻撃',91,'航空・市場・軍事反応が急変'],['2008','金融危機',84,'市場の怯えが極端に増幅'],['2011','東日本大震災',88,'日本周辺・物流・電力不安が急上昇'],['2020','世界的感染拡大',86,'航空停止と市場急変'],['2022','ウクライナ侵攻',89,'黒海方面と市場が急上昇'],['2023','中東衝突拡大',82,'中東方面の緊張上昇']];
const positions={'中東方面':[57,54],'台湾海峡方面':[72,58],'黒海方面':[52,36],'日本周辺':[80,48],'北極圏方面':[50,16],'米国本土方面':[24,45]};
let last=null, currentRegions=[];
function val(x){return typeof x==='object'&&x?Number(x.value??x.score??50):Number(x??50)}
function clamp(n){return Math.max(0,Math.min(100,Math.round(n)))}
function roman(s){return s>=85?'Ⅴ':s>=70?'Ⅳ':s>=50?'Ⅲ':s>=30?'Ⅱ':'Ⅰ'}
function deltaText(n){if(n>0)return '▲'+n; if(n<0)return '▼'+Math.abs(n); return '±0'}
function setDelta(id,n){const e=document.getElementById(id);e.textContent=deltaText(n);e.className='delta '+(n>0?'up':n<0?'down':'')}
function fallback(){const t=Date.now()/100000;return {ok:true,doom:clamp(55+Math.sin(t)*14),metrics:{air:clamp(60+Math.sin(t*1.2)*18),market:clamp(49+Math.cos(t*.8)*15),shipping:clamp(55+Math.sin(t*.7)*13),solar:clamp(38+Math.cos(t*1.5)*20)}}}
async function getData(){try{const r=await fetch('/api/doom?ts='+Date.now(),{cache:'no-store'});const d=await r.json();if(!d||typeof d.doom!=='number')throw 0;return d}catch(e){return fallback()}}
function regionScores(d){const m=d.metrics||{};const air=val(m.air),market=val(m.market),shipping=val(m.shipping),solar=val(m.solar);return [['中東方面',clamp(air*.45+shipping*.35+market*.2+12)],['台湾海峡方面',clamp(air*.5+shipping*.25+solar*.1+8)],['黒海方面',clamp(air*.38+market*.28+shipping*.22+6)],['日本周辺',clamp(air*.3+solar*.35+shipping*.2)],['北極圏方面',clamp(solar*.45+air*.2+10)],['米国本土方面',clamp(market*.45+air*.25+solar*.15)]].sort((a,b)=>b[1]-a[1])}
function drawRadar(rs){const r=document.getElementById('radar');r.querySelectorAll('.node').forEach(n=>n.remove());rs.forEach(([name,score],i)=>{const [x,y]=positions[name];const n=document.createElement('div');n.className='node'+(i===0?' active':'');n.style.left=x+'%';n.style.top=y+'%';const size=70+score*1.7;n.innerHTML=`<div class="zone" style="width:${size}px;height:${size}px;opacity:${.22+score/140}"></div><div class="dot"></div><div class="name">${name} ${score}</div>`;n.onclick=()=>showDetail(name,score);r.appendChild(n)})}
function showDetail(name,score){const m=last?.metrics||{};document.getElementById('detail').innerHTML=`<div class="detailTitle">${name}　${score}</div><div class="detailRows"><div>航空活動<br><b>${val(m.air)}</b></div><div>海運異常<br><b>${val(m.shipping)}</b></div><div>市場反応<br><b>${val(m.market)}</b></div><div>太陽活動<br><b>${val(m.solar)}</b></div></div>`;document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));[...document.querySelectorAll('.node')].find(n=>n.textContent.includes(name))?.classList.add('active')}
function renderRegions(rs){document.getElementById('regions').innerHTML=rs.map(([n,s])=>`<div class="region" onclick="showDetail('${n}',${s})"><b>${n}</b><div class="bar"><i style="width:${s}%"></i></div><span class="score ${s>=70?'high':s>=50?'mid':'low'}">${s}</span></div>`).join('')}
function renderArchive(current){const near=archives.reduce((a,b)=>Math.abs(b[2]-current)<Math.abs(a[2]-current)?b:a,archives[0]);document.getElementById('nearest').innerHTML=`過去記録照合：<b>${near[1]}</b> 観測圏。差分 ${Math.abs(near[2]-current)}。`;document.getElementById('archive').innerHTML=archives.map(e=>`<tr><td>${e[0]}</td><td>${e[1]}<br><span style="color:#9b7777">${e[3]}</span></td><td>${e[2]}</td><td>${Math.abs(e[2]-current)<=8?'<span class="near">接近</span>':''}</td></tr>`).join('')}
function renderOmens(rs,d){const m=d.metrics||{};const top=rs.slice(0,3);const arr=[`${top[0][0]}に赤色反応`,`${top[1][0]}の監視密度上昇`,val(m.air)>60?'特殊機活動を観測':'航空活動に微細な乱れ',val(m.market)>60?'市場心理の悪化傾向':'市場反応は限定的',val(m.shipping)>60?'海路に微細な乱れ':'海運監視継続'].slice(0,4);document.getElementById('omens').innerHTML=arr.map(x=>`<li>${x}</li>`).join('')}
function renderLogs(rs,d){const now=new Date();const tm=n=>new Date(now-n*60000).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});const m=d.metrics||{};const l=[`${tm(0)}  ${rs[0][0]}  危険方面として記録`,`${tm(6)}  空のざわめき  ${val(m.air)}`,`${tm(14)}  市場の怯え    ${val(m.market)}`,`${tm(22)}  海運の乱れ    ${val(m.shipping)}`];document.getElementById('logs').innerHTML=l.map(x=>`<li>${x}</li>`).join('')}
async function update(){const d=await getData();const m=d.metrics||{};const doom=clamp(d.doom);const prev=Number(localStorage.getItem('prevDoom')||doom);document.getElementById('doom').textContent=doom;document.getElementById('roman').textContent=roman(doom);document.getElementById('doomFill').style.width=doom+'%';setDelta('doomDelta',doom-prev);['air','market','shipping','solar'].forEach(k=>{const v=clamp(val(m[k]));const p=Number(localStorage.getItem('prev_'+k)||v);document.getElementById(k).textContent=v;document.getElementById(k+'Delta').textContent='前回比 '+deltaText(v-p)});last=d;const rs=regionScores(d);currentRegions=rs;renderRegions(rs);drawRadar(rs);showDetail(rs[0][0],rs[0][1]);renderArchive(doom);renderOmens(rs,d);renderLogs(rs,d);localStorage.setItem('prevDoom',doom);['air','market','shipping','solar'].forEach(k=>localStorage.setItem('prev_'+k,clamp(val(m[k]))))}
update();setInterval(update,300000);
</script>
</body>
</html>
